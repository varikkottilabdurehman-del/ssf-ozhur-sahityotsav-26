<style>
  :root {
    --lime: #c8f03e;
    --teal: #1dcfb4;
    --dark: #0d0d0d;
    --off: #111;
    --card: #161616;
    --text: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #cd7f32;
    --red: #FF2121;
    --blue: #4d9fff;
    --brown: #a65628;
    --purple: #AF15D1;
    --lemonteal: #B2F40B;
    --darkorange: #F0850A; 
    --pink: #FF00AE; 
    --newbrown: #FFFF03;
    --oggreen: #1EF505; 
    --bronze: #CD7F32; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

 body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', 'Roboto'
    overflow-x: hidden;
  }

  /* ─── SCROLL PROGRESS BAR ─── */
  #scroll-progress-bar {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 0%;
    height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--lime));
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px var(--teal), 0 0 16px rgba(200,240,62,0.4);
    transition: width 0.08s linear;
    z-index: 101;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 5%;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'poppins', sans-serif; font-weight: 800; font-size: 1.3rem;
    letter-spacing: -0.02em;
  }
  .logo-blocks { display: flex; gap: 3px; }
  .logo-block {
    width: 10px; height: 28px; border-radius: 2px;
  }
  .logo-block:nth-child(1) { background: var(--lime); }
  .logo-block:nth-child(2) { background: var(--teal); width: 14px; }
  .logo-block:nth-child(3) { background: #2dd4bf; }

  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--muted);
    font-size: 0.88rem; letter-spacing: 0.03em; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--teal); }
  .nav-cta {
    background: var(--teal); color: var(--dark) !important;
    font-weight: 600; padding: 8px 18px; border-radius: 6px;
    transition: background 0.2s, transform 0.15s !important;
  }
  .nav-cta:hover { background: var(--lime) !important; transform: translateY(-1px); }

  .hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer;
    padding: 4px;
  }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
